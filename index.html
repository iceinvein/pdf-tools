<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f3ec" />
    <meta name="description" content="Merge, split, extract, and reorder PDF pages in your browser. No uploads, no accounts, no limits. Your files never leave your device." />
    <meta property="og:site_name" content="Quire" />
    <meta property="og:title" content="Quire: Free PDF Tools, Private, Browser-Based" />
    <meta property="og:description" content="Merge, split, extract, and reorder PDF pages in your browser. No uploads, no accounts, no limits." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://quire-pdf.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Quire: free, private, browser-based PDF tools" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://quire-pdf.netlify.app/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Quire: Free PDF Tools, Private, Browser-Based</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Quire",
      "applicationCategory": "BrowserApplication",
      "operatingSystem": "Any",
      "description": "Browser-based PDF toolkit. Merge, extract, delete, and reorder PDF pages without uploading. Files stay on your device.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": "Merge PDFs, Extract pages, Delete pages, Reorder pages, View PDFs"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("pdf-tools-theme");
          var theme = stored || "system";
          var resolved = theme === "system"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : theme;
          document.documentElement.classList.add(resolved);
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
