<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View, edit, merge, and extract PDF pages in your browser. No uploads, no accounts — everything runs locally." />
    <meta property="og:title" content="PDF Tools" />
    <meta property="og:description" content="View, edit, merge, and extract PDF pages in your browser." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>PDF Tools</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("pdf-tools-theme");
          var theme = stored || "system";
          var resolved = theme === "system"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : theme;
          document.documentElement.classList.add(resolved);
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
